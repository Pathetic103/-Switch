    // Функция отображения навигации
    function renderNav(activeId) {
        const navList = document.getElementById('navList');
        navList.innerHTML = '';
        instructions.forEach(inst => {
            const li = document.createElement('li');
            li.className = 'nav-item';
            const a = document.createElement('a');
            a.className = `nav-link ${activeId === inst.id ? 'active' : ''}`;
            a.textContent = inst.title;
            a.onclick = (e) => {
                e.preventDefault();
                showInstruction(inst.id);
                if (window.innerWidth <= 768) {
                    closeMobileMenu();
                }
            };
            li.appendChild(a);
            navList.appendChild(li);
        });
    }

    // Показать выбранную инструкцию
    function showInstruction(id) {
        const inst = instructions.find(i => i.id === id);
        if (!inst) return;

        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = `
            <div class="instruction-card">
                <h2>${inst.title}</h2>
                <div class="instruction-meta">📅 ${inst.date}</div>
                <div class="instruction-content">${inst.content}</div>
            </div>
        `;
        
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.remove('active');
            if (link.textContent === inst.title) {
                link.classList.add('active');
            }
        });
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Мобильное меню
    function initMobileMenu() {
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        
        function openMobileMenu() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        }
        
        window.closeMobileMenu = function() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        };
        
        menuToggle.addEventListener('click', openMobileMenu);
        overlay.addEventListener('click', window.closeMobileMenu);
    }
    
    // Загрузка первой инструкции
    function init() {
        renderNav(instructions[0].id);
        showInstruction(instructions[0].id);
        initMobileMenu();
    }
    
    init();
</script>
